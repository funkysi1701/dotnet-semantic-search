name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Verify SEO meta (appsettings + index.html)
        run: python scripts/check_seo_meta.py
      # Publish Blazor WASM here so index.html gets real script names (#[.{fingerprint}] is not sent to the server
      # if placeholders were left in place, the browser would only request /_framework/blazor.webassembly → 404).
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.x"
      - name: Publish Blazor client
        run: dotnet publish code/SemanticSearch.Web/SemanticSearch.Web.csproj -c Release -o blazor-publish
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_GRASS_047512803 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          # Pre-built WASM static files (Oryx was uploading project wwwroot and skipping fingerprint substitution).
          app_location: "blazor-publish/wwwroot"
          skip_app_build: true
          # Azure Functions isolated worker (.NET) — POST /api/search
          api_location: "code/SemanticSearch.Api"
          output_location: ""
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_GRASS_047512803 }}
          action: "close"
